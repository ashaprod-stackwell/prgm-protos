<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stackwell — Benefit Program Home (three takes)</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
:root{
  --slate:#1D253F;--slate-600:#151C36;--midnight:#0C1329;
  --mint:#3CDBC0;--mint-600:#27C2A7;--mint-200:#AFEFEB;--green-ink:#0E7C76;--green-soft:#9CF1D6;
  --blue:#112C84;--blue-300:#6888DA;--beam:#9AB758;
  --g50:#F2F3F6;--g100:#DDE0E8;--g300:#A2A7B9;--g400:#8A8FA3;--g500:#73788C;--g600:#606471;
  --white:#FFFFFF;--line:rgba(83,97,139,0.30);--line-soft:rgba(83,97,139,0.18);
}
body{background:#E5E8EE;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 56px;font-family:'General Sans',system-ui,sans-serif;}
button{cursor:pointer;border:none;background:none;font-family:inherit;padding:0;}
.f-head{font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:-0.07em;}
.f-title{font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:-0.01em;}
.f-body{font-family:'General Sans',system-ui,sans-serif;}
.f-label{font-family:'General Sans',system-ui,sans-serif;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
.h-eyebrow{font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:6px;}
.h-title{color:var(--slate);font-size:24px;line-height:1.12;text-align:center;}
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:18px 0 22px;}
.tab{padding:8px 15px;border-radius:12px;background:rgba(29,37,63,0.06);font-size:13px;font-weight:500;color:var(--g600);}
.tab.on{background:var(--slate);color:var(--white);font-weight:600;}
.betcard{margin-top:14px;padding:16px 20px;border-radius:18px;max-width:320px;background:var(--white);border:1px solid var(--g100);box-shadow:0 12px 28px -18px rgba(29,37,63,0.3);}
.bet-h{font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:6px;}
.bet-b{color:var(--slate);font-size:13px;line-height:1.5;}
.phone-outer{width:320px;height:672px;border-radius:44px;padding:9px;background:linear-gradient(160deg,#111,#2a2a2a 50%,#0a0a0a);box-shadow:0 32px 64px -24px rgba(29,37,63,0.5),0 2px 0 rgba(255,255,255,0.05) inset;flex-shrink:0;}
.phone-inner{width:100%;height:100%;border-radius:35px;overflow:hidden;background:linear-gradient(180deg,#141C33,#1D253F 46%,#2A3960);position:relative;}
.sbar{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:30;color:#fff;pointer-events:none;}
.island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:100px;height:28px;border-radius:18px;background:#000;z-index:32;}
.bnav{position:absolute;bottom:0;left:0;right:0;height:80px;padding-bottom:20px;background:var(--midnight);border-top:1px solid var(--line);z-index:20;display:flex;}
.bnav-row{flex:1;display:flex;justify-content:space-around;padding:6px 6px 0;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--g500);font-weight:500;position:relative;}
.bnav-item.active{color:#fff;font-weight:600;}
.bnav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--mint);border-radius:2px;}
.scroll-area{position:absolute;inset:0;overflow-y:auto;padding-top:44px;padding-bottom:84px;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
.noise{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1100px 560px at 8% -10%,rgba(60,219,192,0.08),transparent 60%);}
.topbar{padding:16px 22px 0;display:flex;align-items:center;justify-content:space-between;}
.eyebrow{font-size:11px;color:var(--mint);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;}
.card-dark{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);border-radius:22px;-webkit-backdrop-filter:blur(16px) saturate(1.15);backdrop-filter:blur(16px) saturate(1.15);box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);}
.card-light{background:#fff;border-radius:22px;padding:20px;}
.cta{width:100%;border-radius:9999px;padding:13px;background:var(--slate);color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'General Sans',sans-serif;}
.lockup{display:flex;align-items:center;gap:9px;}
.lw{font-family:'Montserrat',sans-serif;font-weight:600;font-size:13px;letter-spacing:-0.02em;color:#fff;}
.ld{width:1px;height:12px;background:rgba(255,255,255,0.25);}
.lb{width:16px;height:16px;border-radius:4px;background:var(--beam);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;color:var(--slate);}
.ln{font-size:10.5px;font-weight:600;color:#fff;}
.belong{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:18px;background:rgba(60,219,192,0.10);border:1px solid rgba(60,219,192,0.26);}
.faces{display:flex;align-items:center;}
.face{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:600;color:var(--slate);}
.face+.face{margin-left:-9px;}
.sp-item{display:flex;gap:14px;}
.sp-rail{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.sp-node{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sp-node.cur{background:rgba(60,219,192,0.14);border:2px solid var(--mint);}
.sp-node.av{background:rgba(60,219,192,0.10);border:1px solid rgba(60,219,192,0.3);}
.sp-node.done{background:var(--mint);}
.sp-conn{flex:1;width:2px;background:var(--line);margin:3px 0;}
.sp-conn.done{background:var(--mint);}
/* returns calculator drawer (light, from Figma) */
.calc-scrim{position:absolute;inset:0;z-index:38;background:rgba(5,9,20,0.55);opacity:0;pointer-events:none;transition:opacity .25s;}
.calc-scrim.up{opacity:1;pointer-events:auto;}
.calc-sheet{position:absolute;left:0;right:0;bottom:0;z-index:40;background:#fff;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px 20px 24px;transform:translateY(103%);transition:transform .34s cubic-bezier(.2,.8,.25,1);box-shadow:0 -22px 54px -20px rgba(0,0,0,0.5);}
.calc-sheet.up{transform:translateY(0);}
.cbar{flex:1;background:#CBD6F2;border-radius:2px 2px 0 0;}
.cbar.last{background:var(--blue);}
</style>
</head>
<body>
<svg style="display:none">
  <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="i-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>
  <symbol id="i-chevr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>
  <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
  <symbol id="i-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 4 20 12 6 20 6 4"/></symbol>
  <symbol id="i-trend" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></symbol>
</svg>

<div class="h-eyebrow">Programs · No milestones program home · three takes</div>
<div class="h-title f-head">What you got → what now → what you could earn.</div>

<div class="tabs">
  <button class="tab on" data-t="get" onclick="setT('get')">What did you get</button>
  <button class="tab" data-t="now" onclick="setT('now')">What now</button>
  <button class="tab" data-t="earn" onclick="setT('earn')">What you can earn</button>
</div>

<div class="phone-outer">
  <div class="phone-inner">
    <div class="sbar"><span class="f-body" style="font-size:13px;font-weight:600">9:41</span>
      <div style="display:flex;align-items:center;gap:5px"><svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="#fff"/><rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="#fff"/><rect x="9" y="2" width="3" height="8" rx="0.5" fill="#fff"/><rect x="13" y="0" width="3" height="10" rx="0.5" fill="#fff"/></svg><svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="19" height="9" rx="2" stroke="#fff" opacity="0.5"/><rect x="2" y="2" width="15" height="6" rx="1" fill="#fff"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="#fff"/></svg></div>
    </div>
    <div class="island"></div>
    <div class="screen on"><div class="noise"></div><div class="scroll-area" id="body"></div></div>
    <div class="calc-scrim" id="calcScrim" onclick="closeCalc()"></div>
    <div class="calc-sheet" id="calcSheet"></div>
    <div class="bnav"><div class="bnav-row">
      <div class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--g500)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></div>
      <div class="bnav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--mint)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg><span>Programs</span></div>
      <div class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--g500)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>Learning</span></div>
      <div class="bnav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--g500)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg><span>My Stack</span></div>
    </div></div>
  </div>
</div>

<div class="betcard"><div class="bet-h">The bet</div><p class="bet-b" id="bet"></p></div>

<script>
function topbar(){ return '<div class="topbar"><div style="display:flex;align-items:center;gap:6px"><div style="width:22px;height:22px;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center"><span class="f-title" style="color:var(--slate);font-size:12px;font-weight:700">S</span></div><span class="f-title" style="color:#fff;font-size:16px;font-weight:600">stackwell</span></div><div style="display:flex;align-items:center;gap:8px"><div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center"><svg width="15" height="15"><use href="#i-bell" stroke="#fff"/></svg></div><div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--mint);display:flex;align-items:center;justify-content:center"><span class="f-body" style="color:var(--mint);font-size:11px;font-weight:600">MR</span></div></div></div>'; }
function greeting(){ return '<div style="padding:20px 22px 0"><div class="eyebrow">Program active</div><h1 class="f-head" style="color:#fff;font-size:27px;line-height:1.06;margin-top:4px">You\'re in, Maya.</h1></div>'; }
function benefitCard(){ return '<div style="padding:16px 22px 0"><div class="card-dark" style="padding:16px 18px">'
  +'<div class="lockup"><span class="lw">stackwell</span><div class="ld"></div><div class="lb">U</div><span class="ln">United Way Starter Grant</span></div>'
  +'<div style="margin-top:16px"><div class="f-label" style="font-size:10px;color:var(--g400)">Your benefit</div><div style="display:flex;align-items:baseline;gap:6px;margin-top:3px"><span class="f-head" style="color:#fff;font-size:28px;letter-spacing:-0.04em">$500</span><span class="f-body" style="color:var(--g400);font-size:12px">deposited to your account</span></div></div>'
  +'<div style="display:flex;align-items:center;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)"><svg width="13" height="13"><use href="#i-check" stroke="var(--mint)"/></svg><span class="f-body" style="color:var(--g300);font-size:11.5px">Stackwell fees waived through Dec 31, 2026</span></div>'
+'</div></div>'; }
function desc(){ return '<div style="padding:18px 22px 0"><div class="f-label" style="font-size:11px;color:var(--g400);margin-bottom:8px">About this program</div><p class="f-body" style="color:var(--g300);font-size:13px;line-height:1.55">The United Way Starter Grant gives 240 Newark residents a $500 head start with Stackwell fees waived through 2026 — a no-strings boost to begin building wealth on your own terms.</p></div>'; }
function belong(){ return '<div style="padding:18px 22px 0"><div class="belong"><div class="faces"><div class="face" style="width:28px;height:28px;background:var(--mint);border:2px solid var(--slate);font-size:11px">A</div><div class="face" style="width:28px;height:28px;background:var(--blue-300);border:2px solid var(--slate);font-size:11px;color:#fff">J</div><div class="face" style="width:28px;height:28px;background:var(--beam);border:2px solid var(--slate);font-size:11px">D</div></div><div class="f-body" style="flex:1;color:var(--g300);font-size:12px;line-height:1.4">You\'re building wealth with <span style="color:#fff;font-weight:600">240 United Way members</span>. You\'re not doing it alone.</div></div></div>'; }
function suggestedSpine(){
  return '<div style="padding:18px 22px 0">'
    +'<div class="f-label" style="font-size:11px;color:var(--mint);margin-bottom:8px">Keep learning · optional</div>'
    +'<div class="card-light" style="padding:18px">'
      +'<div class="f-label" style="font-size:9px;color:var(--green-ink)">Suggested for you</div>'
      +'<div class="f-title" style="color:var(--slate);font-size:20px;margin-top:4px">Money basics</div>'
      +'<p class="f-body" style="color:var(--g600);font-size:12.5px;line-height:1.5;margin-top:7px">A 12-minute playlist on budgeting, saving, and making your first investment. Watch whenever you like.</p>'
      +'<button class="cta" style="margin-top:15px">Start<svg width="14" height="14"><use href="#i-arrow" stroke="var(--mint)"/></svg></button>'
    +'</div>'
  +'</div>'; }
// ---- returns math (live, monthly compounding: $500 seed + monthly contribution) ----
var SEED=500, RATE=0.084, YEARS=30, R=RATE/12, N=YEARS*12, contrib=20;
function proj(m){ return SEED*Math.pow(1+R,N) + m*(Math.pow(1+R,N)-1)/R; }
function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function calcBars(m){
  var final=proj(m), out='', bars=26;
  for(var i=0;i<bars;i++){
    var t=(i/(bars-1))*N, v=SEED*Math.pow(1+R,t)+m*(Math.pow(1+R,t)-1)/R;
    out+='<div class="cbar'+(i===bars-1?' last':'')+'" style="height:'+Math.max(5,v/final*100).toFixed(1)+'%"></div>';
  }
  return out;
}
function calcStep(d){ contrib=Math.max(0,Math.min(250,contrib+d)); refreshCalc(); }
function refreshCalc(){
  var p=proj(contrib);
  var n=document.getElementById('projNum'); if(n) n.textContent='~'+fmt(p);
  var ce=document.getElementById('contribEcho'); if(ce) ce.textContent=contrib;
  var cv=document.getElementById('contribVal'); if(cv) cv.textContent=contrib;
  var bd=document.getElementById('projBadge'); if(bd) bd.textContent=fmt(p)+' in 30 yrs';
  var bw=document.getElementById('barWrap'); if(bw) bw.innerHTML=calcBars(contrib);
}

function earnCard(){ return '<div style="padding:16px 22px 0"><div class="card-dark" style="padding:16px 18px">'
  +'<div style="display:flex;align-items:center;gap:7px"><svg width="14" height="14"><use href="#i-trend" stroke="var(--mint)"/></svg><span class="f-label" style="font-size:10px;color:var(--mint)">If you keep it invested</span></div>'
  +'<div style="display:flex;align-items:baseline;gap:6px;margin-top:8px"><span class="f-head" id="projNum" style="color:#fff;font-size:27px;letter-spacing:-0.04em">~'+fmt(proj(contrib))+'</span><span class="f-body" style="color:var(--g400);font-size:12px">in 30 years</span></div>'
  +'<p class="f-body" style="color:var(--g300);font-size:11.5px;line-height:1.45;margin-top:6px">Based on adding $<span id="contribEcho">'+contrib+'</span>/mo to your $500, at the market\'s ~8.4% average. It compounds over time.</p>'
  +'<button class="cta" style="margin-top:13px;background:rgba(255,255,255,0.08);border:1px solid var(--line)" onclick="openCalc()"><span style="color:#fff">Adjust the calculator</span><svg width="14" height="14"><use href="#i-chevr" stroke="#fff"/></svg></button>'
+'</div></div>'; }

function openCalc(){
  document.getElementById('calcSheet').innerHTML =
    '<div style="width:38px;height:4px;border-radius:2px;background:var(--g100);margin:0 auto 12px"></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between"><span class="f-title" style="color:var(--slate);font-size:18px">Returns calculator</span><button onclick="closeCalc()"><span class="f-body" style="color:var(--g500);font-size:18px">&#10005;</span></button></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:18px"><button onclick="calcStep(-10)" style="width:36px;height:36px;border-radius:50%;background:var(--g50);border:1px solid var(--g100);font-size:20px;color:var(--slate)">&minus;</button><div style="text-align:center"><div class="f-label" style="font-size:10px;color:var(--g500)">Monthly contribution</div><div class="f-head" style="color:var(--blue);font-size:26px;letter-spacing:-0.02em;margin-top:2px">$<span id="contribVal">'+contrib+'</span><span style="font-size:13px;color:var(--g400);font-weight:500">/mo</span></div></div><button onclick="calcStep(10)" style="width:36px;height:36px;border-radius:50%;background:var(--g50);border:1px solid var(--g100);font-size:20px;color:var(--slate)">+</button></div>'
    +'<div style="border-top:1px solid var(--g100);margin-top:16px;padding-top:18px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between"><h2 class="f-head" style="color:var(--slate);font-size:23px;line-height:1.05;max-width:150px">See how your money can grow</h2><span id="projBadge" style="background:var(--blue);color:#fff;font-size:10px;font-weight:600;padding:5px 9px;border-radius:8px;white-space:nowrap">'+fmt(proj(contrib))+' in 30 yrs</span></div>'
      +'<div style="display:flex;align-items:flex-end;gap:2px;height:118px;margin-top:16px" id="barWrap">'+calcBars(contrib)+'</div>'
      +'<div style="display:flex;justify-content:space-between;margin-top:8px"><span class="f-body" style="font-size:10.5px;color:var(--g400)">today</span><span class="f-body" style="font-size:10.5px;color:var(--g400)">in 15 years</span><span class="f-body" style="font-size:10.5px;color:var(--g400)">in 30 years</span></div>'
      +'<p class="f-body" style="color:var(--g500);font-size:10.5px;line-height:1.45;text-align:center;margin-top:14px">Your $500 plus what you add, at the market\'s ~8.4% average over 30 years. Illustrative, not a guarantee.</p>'
    +'</div>'
    +'<button class="cta" style="margin-top:16px;background:var(--slate)" onclick="closeCalc()">Set up auto-deposit</button>';
  document.getElementById('calcSheet').classList.add('up');
  document.getElementById('calcScrim').classList.add('up');
}
function closeCalc(){ document.getElementById('calcSheet').classList.remove('up'); document.getElementById('calcScrim').classList.remove('up'); }

function render(t){
  var b=document.getElementById('body');
  if(t==='now'){
    b.innerHTML = topbar()+greeting()+benefitCard()+suggestedSpine()+belong();
    document.getElementById('bet').textContent = "Bet: keep benefit users engaged with optional content — a light progress bar and one task at a time, so there's a reason to return without faking required milestones.";
    closeCalc();
  } else if(t==='earn'){
    b.innerHTML = topbar()+greeting()+benefitCard()+earnCard()+belong();
    document.getElementById('bet').textContent = "Bet: motivate keeping the $500 invested by showing what it could become. A returns calculator turns a static benefit into a reason to leave it in and add to it.";
    closeCalc();
  } else {
    b.innerHTML = topbar()+greeting()+benefitCard()+belong();
