<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stackwell — Program Entry · Two Screens</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"/>
  <style>
    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
    html, body { background: #E5E8EE; margin: 0; padding: 0; }
    .f-head { font-family: 'Montserrat', sans-serif; letter-spacing: -0.025em; }
    .f-body { font-family: 'General Sans', 'Inter', sans-serif; }
    @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes stepRing {
      0%   { box-shadow: 0 0 0 0   rgba(60,219,192,0.50); }
      70%  { box-shadow: 0 0 0 8px rgba(60,219,192,0);    }
      100% { box-shadow: 0 0 0 0   rgba(60,219,192,0);    }
    }
    .step-active-pulse { animation: stepRing 2s ease-out infinite; }
    .anim-slideUp { animation: slideUp 0.32s ease-out both; }
    .anim-fadeIn  { animation: fadeIn  0.28s ease-out both; }
    button { cursor: pointer; border: none; background: none; padding: 0; }
    .phone-scroll::-webkit-scrollbar { display: none; }
    .phone-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* Light bleed — short slate band, fast fade to white. For Account + Two-screen Screen 2 */
    .grad-tint {
      background:
        radial-gradient(600px 240px at 100% -30%, rgba(60,219,192,0.20), transparent 65%),
        linear-gradient(180deg,
          #2B3556 0%,
          #4B5677 6%,
          #B0B7C7 16%,
          #ECEEF2 24%,
          #FFFFFF 34%,
          #FFFFFF 100%
        );
    }
    /* Done state — plain white */
    .grad-done { background: #FFFFFF; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // DS tokens
    const T = {
      slate:       "#1D253F",
      slateInk:    "#0C1329",
      mint:        "#3CDBC0",
      mintDeep:    "#27C2A7",
      mintSoft:    "#9CF1D6",
      mintInk:     "#0E7C76",
      mintBg:      "#EDFCF6",
      capBlue:     "#112C84",
      white:       "#FFFFFF",
      whiteSoft:   "rgba(255,255,255,0.80)",
      whiteDim:    "rgba(255,255,255,0.60)",
      whiteFaint:  "rgba(255,255,255,0.42)",
      whiteLine:   "rgba(255,255,255,0.14)",
      whiteCard:   "rgba(255,255,255,0.08)",
      n900:        "#232325",
      n700:        "#4D4F57",
      n600:        "#606471",
      n500:        "#73788C",
      n400:        "#8A8FA3",
      n300:        "#A2A7B9",
      n100:        "#DDE0E8",
      n50:         "#F2F3F6",
      n25:         "#F9F9FB",
    };

    const HERO_URL = "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?auto=format&fit=crop&w=900&q=85";

    /* ── icons ── */
    const Svg = ({size=16,style={},strokeWidth=2,color="currentColor",children}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>
    );
    const Arrow  = p => <Svg {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Svg>;
    const ChevL  = p => <Svg {...p}><polyline points="15 18 9 12 15 6"/></Svg>;
    const Check  = p => <Svg {...p}><path d="M5 13l4 4L19 7"/></Svg>;
    const XClose = p => <Svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Svg>;
    const Eye    = p => <Svg {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Svg>;
    const EyeOff = p => <Svg {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></Svg>;
    const QrCode = p => <Svg {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></Svg>;
    const Dollar = p => <Svg {...p}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></Svg>;
    const Trend  = p => <Svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></Svg>;
    const Gift   = p => <Svg {...p}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></Svg>;
    const Users  = p => <Svg {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Svg>;
    const Shield = p => <Svg {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></Svg>;

    /* ── primitives ── */
    const StatusBar = ({tint="light"}) => (
      <>
        <div className="absolute top-0 left-0 right-0 z-30 flex items-center justify-between px-6"
          style={{height:44,color:tint==="dark"?T.slateInk:T.white,pointerEvents:"none"}}>
          <span className="f-body" style={{fontSize:13,fontWeight:600}}>9:41</span>
          <div className="flex items-center gap-1.5">
            <svg width="16" height="10" viewBox="0 0 16 10" fill="none"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="currentColor"/><rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="currentColor"/><rect x="9" y="2" width="3" height="8" rx="0.5" fill="currentColor"/><rect x="13" y="0" width="3" height="10" rx="0.5" fill="currentColor"/></svg>
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M7 2C4.5 2 2.3 2.9 0.7 4.3L7 10L13.3 4.3C11.7 2.9 9.5 2 7 2Z" fill="currentColor"/></svg>
            <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="0.5" y="0.5" width="19" height="9" rx="2" stroke="currentColor" opacity="0.45"/><rect x="2" y="2" width="15" height="6" rx="1" fill="currentColor"/><rect x="20" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/></svg>
          </div>
        </div>
        <div className="absolute top-2 left-1/2 -translate-x-1/2 z-30"
          style={{width:108,height:30,borderRadius:20,background:"#000",pointerEvents:"none"}}/>
      </>
    );

    const SLogo = ({color="white"}) => (
      <div className="flex items-center gap-1.5">
        <div style={{width:24,height:24,borderRadius:"50%",background:T.slateInk,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:12}}>S</span>
        </div>
        <span className="f-head" style={{color:color==="white"?T.white:T.slateInk,fontWeight:600,fontSize:14,letterSpacing:"-0.02em"}}>stackwell</span>
      </div>
    );

    const QrBadge = () => (
      <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full flex-shrink-0"
        style={{background:"rgba(60,219,192,0.12)",border:"1px solid rgba(60,219,192,0.32)"}}>
        <QrCode size={10} style={{color:T.mint}}/>
        <span className="f-body uppercase" style={{fontSize:9.5,color:T.mint,letterSpacing:"0.12em",fontWeight:600}}>Via Campus QR</span>
      </div>
    );

    /* Partner block — "A program in partnership with" + H tile +
       "HBCU Capital Fund" (small) + "HBCU Futures Program" (bold). */
    const PartnerBlock = () => (
      <div>
        <div className="f-body uppercase"
          style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.18em",fontWeight:600}}>
          In partnership with
        </div>
        <div className="f-body uppercase mb-3"
          style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.18em",fontWeight:600}}>
          HBCU Capital Fund
        </div>
        <div className="flex items-center gap-2.5">
          <div style={{width:40,height:40,borderRadius:11,
            background:"rgba(255,255,255,0.10)",
            border:`1px solid ${T.whiteLine}`,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:18}}>H</span>
          </div>
          <div className="f-head" style={{color:T.white,fontWeight:600,fontSize:16,letterSpacing:"-0.02em"}}>
            HBCU Futures Program
          </div>
        </div>
      </div>
    );

    /* ══════════════════════════════════════════════════════════
       SCREEN 1 — TRUST BEAT (image hero)
    ══════════════════════════════════════════════════════════ */
    function Screen1({onCreate, onSignIn, onNext}) {
      return (
        <div className="absolute inset-0 anim-slideUp" style={{background:T.slateInk}}>
          <div className="absolute inset-x-0 top-0" style={{height:"62%",overflow:"hidden"}}>
            <img src={HERO_URL} alt="" className="w-full h-full object-cover"
              style={{filter:"saturate(0.95) contrast(1.02)"}}/>
            <div className="absolute inset-0" style={{
              background:`linear-gradient(180deg, rgba(12,19,41,0.20) 0%, rgba(12,19,41,0.06) 28%, rgba(12,19,41,0.55) 75%, ${T.slateInk} 100%)`
            }}/>
            <div className="absolute inset-x-0 top-0" style={{height:110,
              background:"linear-gradient(180deg, rgba(12,19,41,0.50) 0%, transparent 100%)"}}/>
          </div>
          <StatusBar/>
          <div className="relative z-10 h-full flex flex-col pt-14 px-6 pb-6">
            <div className="flex items-center justify-between">
              <SLogo/>
              <QrBadge/>
            </div>
            <div className="flex-1"/>
            <PartnerBlock/>
            <h1 className="f-head mt-4"
              style={{color:T.white,fontSize:36,fontWeight:600,lineHeight:1.02,letterSpacing:"-0.03em"}}>
              Where your wealth-build begins.
            </h1>
            <p className="f-body mt-3 mb-6"
              style={{color:T.whiteSoft,fontSize:14,lineHeight:1.5,maxWidth:300}}>
              A real investing path with initial funds to start. Free to apply.
            </p>
            <button onClick={onNext}
              className="w-full rounded-full py-4 flex items-center justify-center gap-2"
              style={{background:T.white,color:T.slateInk}}>
              <span className="f-body" style={{fontSize:15,fontWeight:600}}>See what's included</span>
              <Arrow size={16} strokeWidth={2.4} color={T.slateInk}/>
            </button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       SCREEN 2 — INFO BEAT (light bleed)
    ══════════════════════════════════════════════════════════ */
    function Screen2({onCreate, onSignIn, onBack}) {
      return (
        <div className="absolute inset-0 anim-slideUp grad-tint">
          <StatusBar/>
          <div className="relative z-10 h-full flex flex-col pt-14 px-6 pb-6">
            <div className="flex items-center gap-3">
              <button onClick={onBack}
                className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
                style={{background:"rgba(255,255,255,0.16)",border:`1px solid ${T.whiteLine}`}}>
                <ChevL size={16} color={T.white}/>
              </button>
              <div className="flex items-center gap-2">
                <div style={{width:18,height:18,borderRadius:4,background:"rgba(255,255,255,0.10)",
                  border:`1px solid ${T.whiteLine}`,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:10}}>H</span>
                </div>
                <span className="f-body uppercase"
                  style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.12em",fontWeight:600}}>HBCU Futures Program</span>
              </div>
            </div>
            <div className="mt-5 flex-1">
              <h1 className="f-head mb-5"
                style={{color:T.slateInk,fontSize:26,fontWeight:600,lineHeight:1.1,letterSpacing:"-0.02em"}}>
                Here's what you're getting.
              </h1>
              <div className="space-y-2">
                {[
                  {icon:<Gift size={13} color={T.mintInk} strokeWidth={2}/>,   l:"Starter investment", s:"Funds toward your first investment"},
                  {icon:<Trend size={13} color={T.mintInk} strokeWidth={2}/>,  l:"Guided milestones",  s:"Step-by-step investing path"},
                  {icon:<Shield size={13} color={T.mintInk} strokeWidth={2}/>, l:"Free to join",         s:"No cost, fees covered for the duration of the program"},
                ].map((b,i)=>(
                  <div key={i} className="flex items-center gap-3 px-3.5 py-3 rounded-2xl"
                    style={{background:T.white,border:`1px solid ${T.n100}`}}>
                    <div style={{width:30,height:30,borderRadius:8,background:T.mintBg,
                      border:`1px solid ${T.mintSoft}`,
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {b.icon}
                    </div>
                    <div>
                      <div className="f-body" style={{color:T.slateInk,fontSize:13,fontWeight:600}}>{b.l}</div>
                      <div className="f-body" style={{color:T.n500,fontSize:11.5}}>{b.s}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="mt-4 px-4 py-3 rounded-2xl"
                style={{background:T.n25,border:`1px solid ${T.n100}`}}>
                <span className="f-body" style={{color:T.n600,fontSize:12,lineHeight:1.65,display:"block"}}>
                  Open to HBCU students only. Takes about 2 minutes to apply.
                </span>
              </div>
            </div>
            <div className="mt-4 space-y-1">
              <button onClick={onCreate}
                className="w-full rounded-full py-4 flex items-center justify-center gap-2"
                style={{background:T.slateInk,color:T.white,
                  boxShadow:"0 10px 28px -10px rgba(12,19,41,0.45)"}}>
                <span className="f-body" style={{fontSize:15,fontWeight:600}}>Create my account</span>
                <Arrow size={16} strokeWidth={2.4}/>
              </button>
              <button onClick={onSignIn} className="w-full py-3 flex items-center justify-center">
                <span className="f-body" style={{color:T.slateInk,fontSize:14,fontWeight:600}}>I already have a Stackwell account</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       ACCOUNT — create / sign-in (cold). Identical to proto-axis.
    ══════════════════════════════════════════════════════════ */
    function AccountCreation({onNext, onBack, mode="create"}) {
      const [show, setShow] = useState(false);
      const isCreate = mode === "create";
      return (
        <div className="absolute inset-0 anim-slideUp grad-tint">
          <StatusBar/>
          <div className="relative z-10 h-full flex flex-col pt-14 px-6 pb-6">
            <button onClick={onBack}
              className="w-9 h-9 rounded-full flex items-center justify-center"
              style={{background:"rgba(255,255,255,0.16)",border:`1px solid ${T.whiteLine}`}}>
              <ChevL size={16} color={T.white}/>
            </button>
            <div className="mt-4 p-3 rounded-2xl flex items-center gap-3"
              style={{background:"rgba(255,255,255,0.12)",border:`1px solid rgba(255,255,255,0.20)`,backdropFilter:"blur(8px)"}}>
              <div style={{width:26,height:26,borderRadius:6,background:T.slateInk,
                border:`1px solid ${T.whiteLine}`,
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:13}}>H</span>
              </div>
              <div>
                <div className="f-body uppercase" style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.14em",fontWeight:600}}>
                  {isCreate ? "Applying to" : "We'll route you to"}
                </div>
                <div className="f-body" style={{color:T.white,fontSize:12,fontWeight:600}}>
                  HBCU Futures Program
                </div>
              </div>
            </div>
            <h1 className="f-head mt-5"
              style={{color:T.slateInk,fontSize:28,fontWeight:600,lineHeight:1.1,letterSpacing:"-0.02em"}}>
              {isCreate
                ? "Create your account."
                : "Welcome back."
              }
            </h1>
            {!isCreate && (
              <p className="f-body mt-3 mb-4" style={{color:T.n600,fontSize:13,lineHeight:1.55}}>
                Sign in and we'll drop you right into the application for this program.
              </p>
            )}
            {isCreate && <div style={{height:20}}/>}
            <div className="space-y-3.5 flex-1">
              <div>
                <label className="f-body uppercase" style={{fontSize:10,color:T.n500,letterSpacing:"0.14em",fontWeight:600}}>Email</label>
                <div className="mt-1.5 px-4 py-3.5 rounded-2xl"
                  style={{background:T.white,border:`1px solid ${T.n100}`}}>
                  <span className="f-body" style={{color:T.slateInk,fontSize:14}}>maya.rivers@howard.edu</span>
                </div>
              </div>
              <div>
                <label className="f-body uppercase" style={{fontSize:10,color:T.n500,letterSpacing:"0.14em",fontWeight:600}}>Password</label>
                <div className="mt-1.5 px-4 py-3.5 rounded-2xl flex items-center justify-between"
                  style={{background:T.white,border:`1.5px solid ${T.slateInk}`}}>
                  <span className="f-body tracking-widest" style={{color:T.slateInk,fontSize:14}}>
                    {show?"builtforthis2026":"••••••••••••"}
                  </span>
                  <button onClick={()=>setShow(v=>!v)}>
                    {show?<EyeOff size={16} color={T.n500}/>:<Eye size={16} color={T.n500}/>}
                  </button>
                </div>
                {isCreate && (
                  <>
                    <div className="flex gap-1 mt-2">
                      {[0,1,2,3].map(i=>(
                        <div key={i} className="flex-1 h-1 rounded-full"
                          style={{background:i<3?T.mintDeep:T.n100}}/>
                      ))}
                    </div>
                    <div className="f-body mt-1.5" style={{color:T.n500,fontSize:11}}>Strong password</div>
                  </>
                )}
              </div>
              {!isCreate && (
                <button className="text-right w-full">
                  <span className="f-body" style={{color:T.mintInk,fontSize:12.5,fontWeight:600}}>Forgot password?</span>
                </button>
              )}
            </div>
            <div className="flex items-start gap-2 mb-3">
              <Shield size={12} color={T.mintInk} style={{marginTop:2,flexShrink:0}}/>
              <p className="f-body" style={{color:T.n500,fontSize:10.5,lineHeight:1.5}}>
                By continuing you agree to Stackwell's Terms and Privacy Policy.
              </p>
            </div>
            <button onClick={onNext}
              className="w-full rounded-full py-4 flex items-center justify-center gap-2"
              style={{background:T.slateInk,color:T.white,
                boxShadow:"0 10px 28px -10px rgba(12,19,41,0.45)"}}>
              <span className="f-body" style={{fontSize:15,fontWeight:600}}>
                {isCreate ? "Create my account" : "Sign in and continue"}
              </span>
              <Arrow size={16} strokeWidth={2.4}/>
            </button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       RECOGNIZED — edge case: user already logged in / recognized.
       Keeps the "We'll route you to" tile up top for consistency.
    ══════════════════════════════════════════════════════════ */
    function RecognizedSignIn({onNext, onBack}) {
      const [show, setShow] = useState(false);
      return (
        <div className="absolute inset-0 anim-slideUp grad-tint">
          <StatusBar/>
          <div className="relative z-10 h-full flex flex-col pt-14 px-6 pb-6">
            <button onClick={onBack}
              className="w-9 h-9 rounded-full flex items-center justify-center"
              style={{background:"rgba(255,255,255,0.16)",border:`1px solid ${T.whiteLine}`}}>
              <ChevL size={16} color={T.white}/>
            </button>
            <div className="mt-4 p-3 rounded-2xl flex items-center gap-3"
              style={{background:"rgba(255,255,255,0.12)",border:`1px solid rgba(255,255,255,0.20)`,backdropFilter:"blur(8px)"}}>
              <div style={{width:26,height:26,borderRadius:6,background:T.slateInk,
                border:`1px solid ${T.whiteLine}`,
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:13}}>H</span>
              </div>
              <div>
                <div className="f-body uppercase" style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.14em",fontWeight:600}}>
                  We'll route you to
                </div>
                <div className="f-body" style={{color:T.white,fontSize:12,fontWeight:600}}>
                  HBCU Futures Program
                </div>
              </div>
            </div>
            <h1 className="f-head mt-7"
              style={{color:T.slateInk,fontSize:28,fontWeight:600,lineHeight:1.1,letterSpacing:"-0.02em"}}>
              Welcome back.
            </h1>
            <p className="f-body mt-3"
              style={{color:T.n600,fontSize:14}}>
              maya.rivers@howard.edu
            </p>
            <button className="mt-1 self-start">
              <span className="f-body" style={{color:T.mintInk,fontSize:12.5,fontWeight:600}}>Not you? Log out</span>
            </button>
            <div className="mt-6 flex-1">
              <label className="f-body uppercase" style={{fontSize:10,color:T.n500,letterSpacing:"0.14em",fontWeight:600}}>Password</label>
              <div className="mt-1.5 px-4 py-3.5 rounded-2xl flex items-center justify-between"
                style={{background:T.white,border:`1.5px solid ${T.slateInk}`}}>
                <span className="f-body tracking-widest" style={{color:T.slateInk,fontSize:14}}>
                  {show?"builtforthis2026":"••••••••••••"}
                </span>
                <button onClick={()=>setShow(v=>!v)}>
                  {show?<EyeOff size={16} color={T.n500}/>:<Eye size={16} color={T.n500}/>}
                </button>
              </div>
              <button className="mt-2">
                <span className="f-body" style={{color:T.mintInk,fontSize:12.5,fontWeight:600}}>Forgot password?</span>
              </button>
            </div>
            <button onClick={onNext}
              className="w-full rounded-full py-4 flex items-center justify-center gap-2"
              style={{background:T.slateInk,color:T.white,
                boxShadow:"0 10px 28px -10px rgba(12,19,41,0.45)"}}>
              <span className="f-body" style={{fontSize:15,fontWeight:600}}>Log in and continue</span>
              <Arrow size={16} strokeWidth={2.4}/>
            </button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       ORIENTATION BEAT — post sign-up / post login welcome
    ══════════════════════════════════════════════════════════ */
    function OrientationBeat({onNext, onSkip}) {
      const steps = [
        { n:1, title:"Complete your application",  sub:"About 2 minutes" },
        { n:2, title:"We review your application",   sub:"Up to 5 business days." },
        { n:3, title:"Your first milestone unlocks", sub:"Once you're approved" },
      ];
      return (
        <div className="absolute inset-0 anim-slideUp" style={{background:T.slateInk}}>
          {/* ambient glow */}
          <div style={{position:"absolute",top:-80,left:"50%",transform:"translateX(-50%)",
            width:320,height:320,borderRadius:"50%",pointerEvents:"none",
            background:"radial-gradient(circle, rgba(60,219,192,0.13) 0%, transparent 68%)"}}/>
          {/* decorative curve */}
          <svg style={{position:"absolute",top:0,right:0,pointerEvents:"none",zIndex:0}}
            width="220" height="260" viewBox="0 0 220 260">
            <path d="M220 20 Q 130 60 125 165 T 40 260"
              stroke="#3CDBC0" strokeOpacity="0.12" strokeWidth="1" fill="none"/>
            <path d="M220 70 Q 150 110 145 200 T 90 260"
              stroke="#3CDBC0" strokeOpacity="0.06" strokeWidth="1" fill="none"/>
          </svg>
          <StatusBar/>
          <div className="relative z-10 h-full flex flex-col pt-14 px-6 pb-6">

            {/* Close — same icon-button component as the back control on the other screens.
               Routes to the Programs tab (Screen 05), where the application waits as an
               action-card prompt. Not a dead dismiss. */}
            <div className="flex justify-end mb-3">
              <button onClick={onSkip}
                className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
                style={{background:"rgba(255,255,255,0.16)",border:`1px solid ${T.whiteLine}`}}>
                <XClose size={16} color={T.white}/>
              </button>
            </div>

            {/* Program chip — frosted glass, same as AccountCreation */}
            <div className="p-3 rounded-2xl flex items-center gap-3"
              style={{background:"rgba(255,255,255,0.12)",border:`1px solid rgba(255,255,255,0.20)`,backdropFilter:"blur(8px)"}}>
              <div style={{width:26,height:26,borderRadius:6,background:T.slateInk,
                border:`1px solid ${T.whiteLine}`,
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span className="f-head" style={{color:T.mint,fontWeight:700,fontSize:13}}>H</span>
              </div>
              <div>
                <div className="f-body uppercase"
                  style={{fontSize:10,color:T.whiteDim,letterSpacing:"0.14em",fontWeight:600}}>
                  Applying to
                </div>
                <div className="f-body" style={{color:T.white,fontSize:12.5,fontWeight:600,letterSpacing:"-0.01em"}}>
                  HBCU Futures Program
                </div>
              </div>
            </div>

            {/* Welcome + name */}
            <h1 className="f-head mt-6"
              style={{color:T.white,fontSize:36,fontWeight:600,lineHeight:1.02,letterSpacing:"-0.03em"}}>
              Welcome,<br/><span style={{fontStyle:"italic",color:T.mint}}>Maya.</span>
            </h1>
            <p className="f-body mt-3" style={{color:T.whiteDim,fontSize:14,lineHeight:1.55}}>
              Three steps to your first investment. Here's what to expect.
            </p>

            {/* Steps */}
            <div className="mt-4 flex flex-col" style={{gap:0}}>
              {steps.map((s,i) => {
                const active = i === 0;
                return (
                  <div key={s.n}>
                    <div className="flex items-start gap-3 px-4 py-3.5 rounded-2xl"
                      style={{
                        background: active ? "rgba(60,219,192,0.08)" : "rgba(255,255,255,0.03)",
                        border: active ? "1px solid rgba(60,219,192,0.30)" : `1px solid ${T.whiteLine}`,
                      }}>
                      {/* Number circle — filled + pulsing for active, dim outline for upcoming */}
                      <div className={active ? "step-active-pulse" : ""}
                        style={{width:28,height:28,borderRadius:"50%",flexShrink:0,marginTop:1,
                        background: active ? T.mint : "transparent",
                        border: active ? "none" : "1.5px solid rgba(60,219,192,0.22)",
                        display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span className="f-head" style={{
                          color: active ? T.slateInk : "rgba(60,219,192,0.40)",
                          fontSize:13, fontWeight:600,
                        }}>{s.n}</span>
                      </div>
                      <div style={{flex:1}}>
                        <div className="f-body" style={{
                          color: active ? T.white : T.whiteDim,
                          fontSize:13.5, fontWeight:600, letterSpacing:"-0.01em", lineHeight:1.25,
                        }}>{s.title}</div>
                        <div className="f-body mt-0.5" style={{
                          color: active ? T.whiteDim : "rgba(255,255,255,0.50)",
                          fontSize:11.5, lineHeight:1.4,
                        }}>{s.sub}</div>
                      </div>
                    </div>
                    {/* Connector */}
                    {i < steps.length - 1 && (
                      <div style={{width:1,height:8,marginLeft:28,
                        background:"linear-gradient(180deg, rgba(60,219,192,0.20), transparent)"}}/>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{flex:1}}/>

            <button onClick={onNext}
              className="w-full rounded-full py-4 flex items-center justify-center gap-2"
              style={{background:T.white,color:T.slateInk}}>
              <span className="f-body" style={{fontSize:15,fontWeight:600}}>Start my application</span>
              <Arrow size={16} strokeWidth={2.4} color={T.slateInk}/>
            </button>
          </div>
        </div>
      );
    }

    /* ── Done state (mostly white) ── */
    function Done({onRestart}) {
      return (
        <div className="absolute inset-0 flex flex-col items-center justify-center anim-fadeIn grad-done">
          <StatusBar tint="dark"/>
          <div className="text-center px-8">
            <div style={{width:64,height:64,borderRadius:18,background:T.mintBg,
              border:`1px solid ${T.mintSoft}`,display:"flex",alignItems:"center",
              justifyContent:"center",margin:"0 auto 20px"}}>
              <Check size={26} color={T.mintInk} strokeWidth={2.2}/>
            </div>
            <div className="f-body uppercase mb-2"
              style={{fontSize:10,color:T.mintInk,letterSpacing:"0.16em",fontWeight:600}}>You're in</div>
            <p className="f-head"
              style={{color:T.slateInk,fontSize:24,fontWeight:600,letterSpacing:"-0.025em",lineHeight:1.15}}>
              HBCU Futures Program
            </p>
            <p className="f-body mt-3" style={{color:T.n600,fontSize:13,lineHeight:1.5}}>
              Application and guided investing path live downstream from here.
            </p>
            <button onClick={onRestart}
              className="mt-8 rounded-full"
              style={{background:T.slateInk,color:T.white,padding:"12px 28px"}}>
              <span className="f-body" style={{fontSize:14,fontWeight:600}}>Restart</span>
            </button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       APP — locked to the Two Screens position
    ══════════════════════════════════════════════════════════ */
    function App() {
      // screens: seq1 → seq2 → (account | signin | recognized) → orientation → done
      const [screenId, setScreenId] = useState("seq1");
      // which sign-in case the "I already have a Stackwell account" path leads to
      const [signinMode, setSigninMode] = useState("standard"); // "standard" | "recognized"

      const go      = (s) => setScreenId(s);
      const restart = ()  => setScreenId("seq1");

      const isDone  = screenId === "done";

      // Selecting a case: set the path and restart at the beginning, so the user
      // clicks through naturally to the correct login screen (no flashing).
      const pickCase = (mode) => { setSigninMode(mode); go("seq1"); };

      const renderScreen = () => {
        switch(screenId) {
          case "seq1":        return <Screen1 onNext={()=>go("seq2")}/>;
          case "seq2":        return <Screen2 onCreate={()=>go("account")} onSignIn={()=>go(signinMode==="recognized" ? "recognized" : "signin")} onBack={()=>go("seq1")}/>;
          case "account":     return <AccountCreation onNext={()=>go("orientation")} onBack={()=>go("seq2")} mode="create"/>;
          case "signin":      return <AccountCreation onNext={()=>go("orientation")} onBack={()=>go("seq2")} mode="signin"/>;
          case "recognized":  return <RecognizedSignIn onNext={()=>go("orientation")} onBack={()=>go("seq2")}/>;
          // Routing out of the orientation beat (both terminate at "done" since this entry
          // proto has no Screen 05 / application screen built):
          //   X (onSkip)            -> Programs tab (Screen 05). Lands on home; application
          //                            waits as an action-card prompt (user taps to start).
          //   Start (onNext)        -> straight into the application form, auto-launched from
          //                            the Programs tab action card (PRD Screen 04 behavior).
          case "orientation": return <OrientationBeat onNext={()=>go("done")} onSkip={()=>go("done")}/>;
          case "done":        return <Done onRestart={restart}/>;
          default:            return null;
        }
      };

      // Dots: trust → info → account-step → orientation.
      // The 3rd dot respects the selected sign-in case: recognized users jump to the
      // "Welcome back" screen, everyone else to create-account.
      const dotScreens = ["seq1","seq2","account","orientation"];
      const dotTargets = ["seq1","seq2", signinMode==="recognized" ? "recognized" : "account", "orientation"];
      const dotIdx = screenId==="seq1"        ? 0
                   : screenId==="seq2"        ? 1
                   : screenId==="orientation" ? 3
                   : 2;

      return (
        <div className="min-h-screen flex flex-col items-center"
          style={{background:"#E5E8EE",paddingTop:28,paddingBottom:52}}>

          {/* Header — identical to proto-axis-interactive */}
          <div className="text-center mb-6" style={{maxWidth:500,padding:"0 16px"}}>
            <div className="f-body uppercase mb-1.5"
              style={{fontSize:10,color:T.n500,letterSpacing:"0.18em",fontWeight:600}}>
              P1 · Context Axis
            </div>
            <div className="f-head"
              style={{color:T.slateInk,fontSize:25,fontWeight:600,letterSpacing:"-0.025em"}}>
              How much does a user need to see<br/>before they commit?
            </div>
          </div>

          {/* Axis — stagnant on More, four nobs (matches proto-axis) */}
          <div className="flex items-center gap-0 mb-7" style={{maxWidth:500,width:"100%",padding:"0 24px"}}>
            <span className="f-body" style={{fontSize:10,color:T.n500,letterSpacing:"0.1em",flexShrink:0,fontWeight:600}}>Less</span>
            <div className="flex-1 flex items-center mx-3" style={{position:"relative",height:20}}>
              <div style={{position:"absolute",left:0,right:0,height:2,background:"rgba(12,19,41,0.14)",borderRadius:2}}/>
              {[0,1,2,3].map(i => {
                const active = i === 3;
                const pct = i / 3 * 100;
                return (
                  <div key={i}
                    style={{position:"absolute",left:`${pct}%`,transform:"translateX(-50%)",
                            width:active?14:10,height:active?14:10,borderRadius:"50%",
                            background:active?T.slateInk:"rgba(12,19,41,0.22)",
                            border:active?`2px solid ${T.slateInk}`:"none",zIndex:1}}/>
                );
              })}
            </div>
            <span className="f-body" style={{fontSize:10,color:T.n500,letterSpacing:"0.1em",flexShrink:0,fontWeight:600}}>More</span>
          </div>

          {/* Sign-in case toggle — dashed box above the prototype */}
          <div className="mb-7 px-5 py-4 rounded-2xl"
            style={{maxWidth:380,width:"100%",background:"rgba(12,19,41,0.04)",border:`1px dashed ${T.n300}`}}>
            <div className="flex gap-1.5">
              {[
                {key:"standard",   label:"New device sign-in"},
                {key:"recognized", label:"Recognized user"},
              ].map(c=>{
                const selected = signinMode === c.key;
                return (
                  <button key={c.key} onClick={()=>pickCase(c.key)}
                    className="flex-1 px-3 py-2.5 rounded-xl"
                    style={{background:selected?T.slateInk:T.white,
                            border:`1px solid ${selected?T.slateInk:T.n100}`}}>
                    <span className="f-body" style={{fontSize:12.5,fontWeight:600,
                      color:selected?T.white:T.slateInk}}>{c.label}</span>
                  </button>
                );
              })}
            </div>
            <p className="f-body mt-2.5" style={{color:T.n400,fontSize:11,lineHeight:1.5}}>
              {signinMode==="recognized"
                ? "Recognized: already signed in on this device, so the step shows a \"Welcome back\" state instead of the full form."
                : "New device: the standard email + password sign-in form."}
            </p>
          </div>

          {/* Phone */}
          <div style={{width:340,height:712,borderRadius:46,padding:10,
            background:"linear-gradient(160deg,#111 0%,#2a2a2a 50%,#0a0a0a 100%)",
            boxShadow:"0 48px 96px -32px rgba(12,19,41,0.55), 0 2px 0 rgba(255,255,255,0.05) inset, 0 0 0 1px rgba(255,255,255,0.04) inset"}}>
            <div key={screenId}
              className="relative overflow-hidden"
              style={{width:"100%",height:"100%",borderRadius:36,background:T.slateInk}}>
              {renderScreen()}
            </div>
          </div>

          {/* Dots — clickable to jump straight to any step in the flow */}
          {!isDone && (
            <div className="flex items-center gap-2 mt-6">
              {dotScreens.map((s,i)=>{
                const active = i === dotIdx;
                const done   = i < dotIdx;
                return (
                  <button key={i} onClick={()=>go(dotTargets[i])}
                    title={`Jump to ${dotTargets[i]}`}
                    style={{padding:"6px 0",display:"flex",alignItems:"center"}}>
                    <span style={{
                      width:active?20:7,height:7,borderRadius:4,display:"block",
                      background:active?T.slateInk:done?T.mintDeep:"rgba(12,19,41,0.18)",
                      transition:"all 0.25s ease",
                    }}/>
                  </button>
                );
              })}
            </div>
          )}

          {/* Density label */}
          <div className="mt-6 mb-3 text-center" style={{maxWidth:340,padding:"0 16px"}}>
            <div className="f-body uppercase"
              style={{fontSize:10,color:T.n500,letterSpacing:"0.12em",fontWeight:600}}>
              Right place, then what it involves
            </div>
          </div>

          {/* Bet card */}
          <div className="px-5 py-4 rounded-2xl"
            style={{maxWidth:340,width:"100%",background:T.white,border:`1px solid ${T.n100}`}}>
            <div className="f-body uppercase mb-1.5"
              style={{fontSize:10,color:T.n500,letterSpacing:"0.14em",fontWeight:600}}>The bet</div>
            <p className="f-body" style={{color:T.slateInk,fontSize:13,lineHeight:1.5}}>
              Separate the trust moment from the information moment.
            </p>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
